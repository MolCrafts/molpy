site_name: MolPy
site_url: https://molcrafts.github.io/molpy
repo_url: https://github.com/MolCrafts/molpy
repo_name: MolCrafts/molpy
site_description: A Python toolkit for reactive topology editing in polymer simulations.

copyright: Copyright &copy; 2024 - 2026 MolCrafts Team

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
  font:
    text: Inter
    code: JetBrains Mono
  favicon: assets/favicon.ico
  logo: assets/molpy.png
  icon:
    repo: fontawesome/brands/github
  custom_dir: docs/assets/overrides

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - mkdocs-jupyter:
      execute: true
      # include_source: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            separate_signature: true
            heading_level: 3
            merge_init_into_class: true
            filters: ["!^_"]

nav:
  - Home: index.md

  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - MCP Setup: getting-started/mcp.md
      - Core Concepts: getting-started/core-concepts.md
      - Naming Conventions: getting-started/naming-conventions.md
      - Glossary: getting-started/glossary.md
      - FAQ: getting-started/faq.md

  - Concepts:
      - tutorials/index.md
      - Atomistic and Topology: tutorials/01_atomistic_and_topology.md
      - Block and Frame: tutorials/02_block_and_frame.md
      - Box and Periodicity: tutorials/03_box_and_periodicity.md
      - Force Field: tutorials/04_force_field.md
      - Trajectory: tutorials/05_trajectory.md
      - Selector: tutorials/06_selector.md
      - Wrapper and Adapter: tutorials/07_wrapper_and_adapter.md
      - Engine: tutorials/engine.md
      - I/O: tutorials/io.md
      - Tool Layer: tutorials/tools.md

  - Guides:
      - user-guide/index.md
      - Parsing Chemistry: user-guide/01_parsing_chemistry.ipynb
      - Building Polymers:
          - Step by Step: user-guide/02_polymer_stepwise.ipynb
          - Topology-Driven Assembly: user-guide/03_polymer_topology.ipynb
          - Crosslinked Networks: user-guide/04_crosslinking.ipynb
          - Polydisperse Systems: user-guide/05_polydisperse_systems.ipynb
      - Force Field Typification: user-guide/06_typifier.ipynb
      - AmberTools Integration: user-guide/07_ambertools_integration.md

  - API Reference:
      - api/index.md
      # Core data structures
      - Core: api/core.md
      # Construction pipeline
      - Parser: api/parser.md
      - Reacter: api/reacter.md
      - Builder: api/builder.md
      - Packing: api/pack.md
      # Parameterization
      - Typifier: api/typifier.md
      - Potentials: api/potential.md
      # I/O and integration
      - I/O: api/io.md
      - Adapter: api/adapter.md
      - Wrapper: api/wrapper.md
      # High-level operations
      - Tool: api/tool.md
      - Engine: api/engine.md
      - Optimization: api/optimize.md

  - Developer Guide:
      - developer/index.md
      - Conventions:
          - Development Setup: developer/development-setup.md
          - Contributing: developer/contributing.md
          - Coding Style: developer/coding-style.md
          - Testing: developer/testing.md
          - Release Process: developer/release-process.md
      - Extending Tools:
          - Tool and Compute: developer/extending-tools.md
          - I/O Formats: developer/extending-io.md
          - Wrappers and Adapters: developer/extending-integration.md
      - Extending Core:
          - Data Model: developer/extending-core.md
          - Force Field: developer/extending-forcefield.md

  - Release Notes: https://github.com/MolCrafts/molpy/releases

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MolCrafts/molpy
  generator: false
