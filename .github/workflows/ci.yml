name: CI

on:
  push:
    branches: [master, dev, dev-*]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install ruff ty

      - name: Ruff format
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Type check
        run: ty check src/molpy/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v -m "not external" --cov=src/molpy --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          slug: MolCrafts/molpy
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  benchmark:
    # Runs the molrs-vs-molpy benchmark suite (MolCrafts/bm-molrs-molpy) against
    # the current molpy SHA, using the published molcrafts-molrs wheel from
    # PyPI (no Rust toolchain). Results are tracked on bm-molrs-molpy's
    # gh-pages dashboard; this job annotates regressions inline on PRs.
    name: Benchmark (bm-molrs-molpy)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'pull_request'
    steps:
      - name: Checkout molpy
        uses: actions/checkout@v4
        with:
          path: molpy

      - name: Detect benchmark-relevant changes
        id: paths
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          working-directory: molpy
          filters: |
            perf:
              - 'src/molpy/io/**'
              - 'src/molpy/core/**'
              - 'src/molpy/compute/**'

      - name: Should run?
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "run=${{ steps.paths.outputs.perf }}" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout bm-molrs-molpy
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: MolCrafts/bm-molrs-molpy
          path: bm

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install molrs from PyPI
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install molcrafts-molrs

      - name: Install molpy (editable, the SHA under test)
        if: steps.gate.outputs.run == 'true'
        working-directory: molpy
        run: python -m pip install -e ".[dev]"

      - name: Install bench harness
        if: steps.gate.outputs.run == 'true'
        working-directory: bm
        run: |
          python -m pip install pytest pytest-benchmark 'freud-analysis>=3.0'
          python -m pip install --no-deps -e .

      - name: Run benchmarks
        if: steps.gate.outputs.run == 'true'
        working-directory: bm
        env:
          BM_MAX_TRAJ_BYTES: '2147483648'  # 2 GiB cap for CI
        run: |
          pytest -v \
            --benchmark-json=../benchmark-result.json \
            --benchmark-columns=min,mean,median,stddev,rounds,iterations \
            --benchmark-group-by=group

      - name: Upload raw benchmark JSON
        if: steps.gate.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: molpy-bench-${{ github.run_id }}
          path: benchmark-result.json
          if-no-files-found: error

      - name: Comment regressions on PR
        if: steps.gate.outputs.run == 'true' && github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: benchmark-result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Don't push history from molpy's CI — canonical dashboard lives in
          # bm-molrs-molpy's gh-pages. Here we only annotate the PR.
          auto-push: false
          save-data-file: false
          alert-threshold: '110%'
          fail-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true
          summary-always: true
