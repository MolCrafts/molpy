name: CI

on:
  push:
    branches: [master, dev, dev-*]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        # Pinned to match .pre-commit-config.yaml (ruff-pre-commit rev) and the
        # [dev] extra, so local pre-commit and CI lint with identical tool
        # versions. Bump ruff/ty in lockstep across all three.
        run: pip install "ruff==0.15.13" "ty==0.0.37"

      - name: Ruff format
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Type check
        run: ty check src/molpy/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # molcrafts-molrs (exact-pinned in pyproject.toml) installs as a wheel
        # from PyPI — no Rust toolchain / source build needed. NOTE: this
        # clean-room install is the ONE check pre-commit cannot mirror — locally
        # molrs is an editable install of the sibling checkout, so the pin's
        # availability on PyPI is never verified there. On a coordinated
        # molrs→molpy release the pinned molrs must reach PyPI *before* this
        # runs; otherwise the job fails transiently until the index propagates —
        # just re-run after molrs publishes.
        run: pip install -e ".[dev]"

      # Clone tests-data once, serially, before the parallel (-n auto) test run.
      # Under xdist the session fixture runs per-worker, so a git op there would
      # mutate the shared checkout while other workers read it (Windows-fatal).
      # Pre-fetching here means every worker sees a stable tree.
      #
      # tests-data has a `con/` directory (EON-format fixtures); `con` is a
      # reserved device name on Windows, so its working tree cannot be checked
      # out there. On Windows we clone metadata only (--no-checkout) so the step
      # succeeds deterministically; the conftest fixture then skips the
      # data-dependent tests (none of which molpy runs on Windows anyway). On
      # Linux/macOS the full clone must succeed — a failure here fails the job.
      - name: Fetch test data
        shell: bash
        run: |
          url=https://github.com/molcrafts/tests-data.git
          if [ -d tests/tests-data/.git ]; then exit 0; fi
          if [ "${RUNNER_OS:-}" = "Windows" ]; then
            git clone --depth 1 --no-checkout "$url" tests/tests-data
          else
            git clone --depth 1 "$url" tests/tests-data
          fi

      - name: Run tests
        run: pytest tests/ -m "not external" -n auto --cov=src/molpy --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          slug: MolCrafts/molpy
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
