name: CI

on:
  push:
    branches: [master, dev, dev-*]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install ruff ty

      - name: Ruff format
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Type check
        run: ty check src/molpy/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain (to build molrs from source)
        uses: dtolnay/rust-toolchain@stable

      - name: Install molrs from source (dev branch)
        # molpy's dev tracks unreleased molrs kernels (e.g. the
        # einstein_helfand_conductivity used by IonicConductivity). Build molrs
        # from its dev branch so CI matches local dev, where contributors run
        # `maturin develop` against a molrs checkout. INTERIM: once molrs cuts a
        # release carrying these kernels, drop this step and bump the
        # molcrafts-molrs pin in pyproject.toml instead.
        run: pip install "molcrafts-molrs @ git+https://github.com/Roy-Kid/molrs.git@dev#subdirectory=molrs-python"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v -m "not external" --cov=src/molpy --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          slug: MolCrafts/molpy
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
