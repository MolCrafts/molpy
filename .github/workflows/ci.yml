name: CI

on:
  push:
    branches: [master, dev, dev-*]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        # Pinned to match .pre-commit-config.yaml (ruff-pre-commit rev) and the
        # [dev] extra, so local pre-commit and CI lint with identical tool
        # versions. Bump ruff/ty in lockstep across all three.
        run: pip install "ruff==0.15.13" "ty==0.0.37"

      - name: Ruff format
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Type check
        run: ty check src/molpy/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # molcrafts-molrs (exact-pinned in pyproject.toml) installs as a wheel
        # from PyPI — no Rust toolchain / source build needed. NOTE: this
        # clean-room install is the ONE check pre-commit cannot mirror — locally
        # molrs is an editable install of the sibling checkout, so the pin's
        # availability on PyPI is never verified there. On a coordinated
        # molrs→molpy release the pinned molrs must reach PyPI *before* this
        # runs; otherwise the job fails transiently until the index propagates —
        # just re-run after molrs publishes.
        run: pip install -e ".[dev]"

      # Clone tests-data once, serially, before the parallel (-n auto) test run.
      # Under xdist the session fixture runs per-worker, so a git op there would
      # mutate the shared checkout while other workers read it. Pre-fetching here
      # means every worker sees a complete, stable tree.
      #
      # Skip the `con/` directory at checkout, leaving tests-data itself untouched.
      # tests-data (a fork of chemfiles/tests-data) ships EON fixtures under con/,
      # a reserved device name Windows cannot create. Two settings are BOTH
      # required on Windows: core.protectNTFS=false lets git process the con/ index
      # entry without rejecting the name, and sparse-checkout keeps con/ off disk so
      # the OS is never asked to create it. Nothing reads con/ data.
      - name: Fetch test data
        shell: bash
        run: |
          dir=tests/tests-data
          if [ -d "$dir/.git" ]; then exit 0; fi
          git clone --depth 1 --no-checkout https://github.com/molcrafts/tests-data.git "$dir"
          git -C "$dir" config core.protectNTFS false
          git -C "$dir" sparse-checkout set --no-cone '/*' '!/con/'
          git -C "$dir" checkout

      - name: Run tests
        run: pytest tests/ -m "not external" -n auto --cov=src/molpy --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          slug: MolCrafts/molpy
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
