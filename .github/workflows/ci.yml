name: CI

# Default gate: lint + unit tests. No caches, no OS matrix, no coverage theater.
# external (network/binaries) is the only exclude. There is no test_integration/.
on:
  push:
    branches: [master, dev, dev-*]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: pip install "ruff==0.15.13" "ty==0.0.37"
      - name: Ruff format
        run: ruff format --check src/ tests/
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Type check
        run: ty check src/molpy/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Fetch test data
        shell: bash
        run: |
          dir=tests/tests-data
          if [ -e "$dir/README.md" ]; then exit 0; fi
          mkdir -p "$dir"
          curl -fsSL https://github.com/molcrafts/tests-data/archive/refs/heads/master.tar.gz \
            | tar -xz -C "$dir" --strip-components=1 --exclude='*/con' --exclude='*/con/*'
      - name: Unit tests
        run: pytest tests/ -m "not external" -n auto
