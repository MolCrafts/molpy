name: Full

# Multi-OS unit matrix. Still no external binaries. No integration tree.
on:
  push:
    branches: [master]
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Fetch test data
        shell: bash
        run: |
          dir=tests/tests-data
          if [ -e "$dir/README.md" ]; then exit 0; fi
          mkdir -p "$dir"
          curl -fsSL https://github.com/molcrafts/tests-data/archive/refs/heads/master.tar.gz \
            | tar -xz -C "$dir" --strip-components=1 --exclude='*/con' --exclude='*/con/*'
      - name: Unit tests
        run: pytest tests/ -m "not external" -n auto
