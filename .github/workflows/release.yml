name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.2.4)'
        required: true
        type: string

jobs:
  release:
    # Only run if CI succeeded AND triggered by a v* tag
    if: |
      github.repository == 'MolCrafts/molpy' &&
      (
        (github.event_name == 'workflow_run' &&
         github.event.workflow_run.conclusion == 'success' &&
         startsWith(github.event.workflow_run.head_branch, 'refs/tags/v'))
        ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Extract version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.event.workflow_run.head_branch }}"
          fi
          VERSION="${VERSION#refs/tags/}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install package
        run: pip install -e .

      - name: Verify version match
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PACKAGE_VERSION=$(python -c "from molpy.version import version; print(version)")
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($VERSION) != package version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
