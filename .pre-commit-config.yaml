# Mirrors every check in .github/workflows/ci.yml. Any divergence is a bug —
# when you add/modify a CI step, update this file in the same commit.
#
# Stages:
#   pre-commit (default): fast checks (ruff format, ruff lint, ty). Every commit.
#   pre-push:             the test suite (matches CI's test job). Before push only.
#
# Install both stages:  pre-commit install --hook-type pre-commit --hook-type pre-push
#
# Tool versions are pinned to match CI exactly: ruff via the ruff-pre-commit
# `rev` below (== the ci.yml pin and the [dev] extra), ty via the [dev] extra
# (`ty==…`, picked up by the `language: system` hook). Bump all three together.
#
# KNOWN GAP — cannot be mirrored here: CI's test job does a clean `pip install`
# that resolves the exact `molcrafts-molrs==X` pin from PyPI. Locally molrs is an
# editable install of the sibling checkout, so the pin's *availability on PyPI*
# is never exercised — only CI catches an unpublished / not-yet-propagated molrs.
# On a coordinated release, publish molrs first, then re-run molpy CI.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: check-toml
      - id: check-json

  # ─── ci.yml::lint — ruff format --check + ruff check src/ tests/ ──────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-format
        args: [--check, src/, tests/]
        pass_filenames: false
      - id: ruff
        args: [src/, tests/]
        pass_filenames: false

  - repo: local
    hooks:
      # ─── ci.yml::lint — ty check src/molpy/ ──────────────────────────────
      # ty version is pinned via the [dev] extra (ty==…); this runs the dev-env ty.
      - id: ty
        name: ty (type check)
        entry: ty check src/molpy/
        language: system
        types: [python]
        pass_filenames: false

      # ─── ci.yml::test — pytest tests/ -m "not external" (pre-push) ───────
      - id: pytest
        name: pytest (mirrors CI test job)
        entry: pytest tests/ -v -m "not external"
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.2
    hooks:
      - id: nbstripout
        files: \.ipynb$
        args: ["--extra-keys=metadata.kernelspec metadata.language_info"]
