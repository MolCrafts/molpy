# Mirrors default CI only. Install: pre-commit install -t pre-commit -t pre-push
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: check-toml
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-format
        args: [--check, src/, tests/]
        pass_filenames: false
      - id: ruff
        args: [src/, tests/]
        pass_filenames: false

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: ty check src/molpy/
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-unit
        name: pytest unit (not external)
        entry: pytest tests/ -m "not external" -n auto
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.2
    hooks:
      - id: nbstripout
        files: \.ipynb$
        args: ["--extra-keys=metadata.kernelspec metadata.language_info"]
